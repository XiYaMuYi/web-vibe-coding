<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020205" />
    <title>悬赏中枢</title>
    <link rel="stylesheet" href="./css/global-ui.css" />
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(10, 15, 30, 0.85);
        --panel-border: rgba(0, 240, 255, 0.15);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #020205; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #eafcff; }
      body {
        background:
          radial-gradient(circle at 50% 40%, rgba(26, 31, 46, 0.98) 0%, rgba(10, 14, 24, 0.96) 30%, rgba(4, 6, 12, 0.98) 56%, #020205 100%),
          radial-gradient(circle at 20% 18%, rgba(0, 240, 255, 0.12), transparent 18%),
          radial-gradient(circle at 78% 26%, rgba(107, 75, 255, 0.12), transparent 20%),
          radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.04), transparent 22%);
      }
      body::before { content:''; position:fixed; inset:-20%; pointer-events:none; background:
        radial-gradient(circle at 18% 28%, rgba(255,255,255,0.09) 0 1px, transparent 1.5px),
        radial-gradient(circle at 68% 16%, rgba(255,255,255,0.07) 0 1px, transparent 1.5px),
        radial-gradient(circle at 82% 72%, rgba(255,255,255,0.08) 0 1px, transparent 1.5px),
        radial-gradient(circle at 40% 74%, rgba(0,240,255,0.08) 0 1px, transparent 1.7px),
        radial-gradient(circle at 52% 48%, rgba(107,75,255,0.08) 0 1px, transparent 1.8px);
        opacity:.48; filter: blur(.2px); animation: driftStars 26s linear infinite; }
      body::after { content:''; position:fixed; inset:0; pointer-events:none; background: radial-gradient(circle at center, transparent 0 20%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.2) 100%), radial-gradient(circle at 50% 42%, rgba(0,240,255,0.06), transparent 28%); }
      @keyframes driftStars { 0% { transform: translate3d(0,0,0) scale(1);} 50% { transform: translate3d(1.2%,-0.8%,0) scale(1.02);} 100% { transform: translate3d(0,0,0) scale(1);} }

      .page-shell { position:fixed; inset:0; display:grid; grid-template-rows:auto 1fr; overflow:hidden; }
      .top-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(10,15,30,0.7); backdrop-filter:blur(12px); z-index:10; }
      .top-bar h1 { margin:0; font-size:clamp(16px,2vw,24px); letter-spacing:.1em; text-shadow:0 0 12px rgba(0,240,255,.3); }
      .top-bar .actions { display:flex; gap:10px; }
      .balance-chip { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); font-size:14px; }
      .delivery-btn { appearance:none; border:0; outline:none; border-radius:10px; padding:8px 14px; cursor:pointer; color:#dffcff; background:linear-gradient(135deg,rgba(0,240,255,.2),rgba(107,75,255,.22)); border:1px solid rgba(255,255,255,.1); box-shadow:0 4px 16px rgba(0,0,0,.4); transition:all .3s ease; }
      .delivery-btn:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 18px rgba(0,240,255,.2); }

      .board-layout { display:grid; grid-template-columns:280px 1fr; overflow:hidden; border:1px solid rgba(0,240,255,.25); border-radius: 20px; margin: 12px; box-shadow: 0 0 40px rgba(0,240,255,.1); }
      .board-sidebar { padding:20px; overflow-y:auto; border-right:1px solid rgba(255,255,255,.05); background:rgba(20,25,40,.65); }
      .board-sidebar::-webkit-scrollbar { width:8px; }
      .board-sidebar::-webkit-scrollbar-thumb { background:rgba(0,240,255,.18); border-radius:999px; }
      .board-sidebar::-webkit-scrollbar-track { background:rgba(255,255,255,.02); }

      .board-content { padding:20px; overflow-y:auto; }
      .board-content::-webkit-scrollbar { width:8px; }
      .board-content::-webkit-scrollbar-thumb { background:rgba(0,240,255,.18); border-radius:999px; }
      .board-content::-webkit-scrollbar-track { background:rgba(255,255,255,.02); }

      .section-title { font-size:13px; letter-spacing:.12em; color:rgba(0,240,255,.65); text-transform:uppercase; margin-bottom:14px; }

      .chip { padding:12px 14px; border-radius:14px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); box-shadow:0 4px 16px rgba(0,0,0,.3); margin-bottom:12px; }
      .chip .label { display:block; font-size:10px; letter-spacing:.12em; color:rgba(0,240,255,.6); margin-bottom:4px; text-transform:uppercase; }
      .chip .value { font-size:16px; }


      .bounty-board-grid { position:relative; min-height:500px; }
      .bounty-card { position:absolute; border-radius:16px; overflow:hidden; background:rgba(20,25,40,.75); border:1px solid rgba(255,255,255,.12); box-shadow:0 12px 40px rgba(0,0,0,.4); transition:all .4s cubic-bezier(.23,1,.32,1); cursor:pointer; }
      .bounty-card:hover { transform:translateY(-4px) scale(1.02); box-shadow:0 16px 48px rgba(0,0,0,.6),0 0 24px rgba(0,240,255,.12); z-index:5; }
      .bounty-card img { width:100%; height:120px; object-fit:cover; border-bottom:1px solid rgba(255,255,255,.06); }
      .bounty-info { padding:10px; }
      .bounty-info h3 { margin:0 0 4px; font-size:13px; font-weight:600; letter-spacing:.04em; }
      .bounty-lore { margin:0 0 8px; font-size:10px; color:rgba(255,255,255,.5); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
      .bounty-tags { display:flex; gap:4px; margin-bottom:6px; }
      .rarity-tag { padding:2px 6px; border-radius:4px; font-size:9px; font-weight:700; letter-spacing:.08em; }
      .rarity-SSR { background:linear-gradient(135deg,rgba(255,200,50,.25),rgba(255,140,50,.2)); color:#ffd700; border:1px solid rgba(255,200,50,.3); }
      .rarity-SR { background:rgba(160,120,255,.18); color:#b48eff; border:1px solid rgba(160,120,255,.25); }
      .rarity-R { background:rgba(0,240,255,.1); color:rgba(0,240,255,.75); border:1px solid rgba(0,240,255,.18); }
      .bounty-meta { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,.5); }
      .bounty-meta .reward { color:rgba(0,240,255,.8); font-weight:600; }
      .bounty-actions { display:flex; gap:6px; padding:8px 10px; border-top:1px solid rgba(255,255,255,.05); }
      .small-btn { appearance:none; border:0; outline:none; border-radius:8px; padding:5px 10px; cursor:pointer; color:#dffcff; background:linear-gradient(135deg,rgba(0,240,255,.18),rgba(107,75,255,.2)); border:1px solid rgba(255,255,255,.08); font-size:11px; transition:all .25s ease; }
      .small-btn:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,240,255,.2); }
      .ghost-btn { appearance:none; border:0; outline:none; border-radius:8px; padding:5px 10px; cursor:pointer; color:rgba(255,255,255,.55); background:transparent; font-size:11px; transition:all .25s ease; }
      .ghost-btn:hover { color:#eafcff; }

      .create-panel { margin-top:20px; }
      .create-panel textarea, .create-panel input[type=number] { width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px; color:#eafcff; font-size:13px; outline:none; resize:vertical; }
      .create-panel textarea { min-height:80px; font-family:inherit; margin-bottom:8px; }
      .create-panel input[type=number] { margin-bottom:8px; }
      .create-panel textarea:focus, .create-panel input[type=number]:focus { border-color:rgba(0,240,255,.35); }

      .image-preview { display:none; margin-top:8px; }
      .image-preview.is-visible { display:block; }
      .image-preview img { width:100%; max-height:160px; object-fit:cover; border-radius:10px; border:1px solid rgba(255,255,255,.08); }

      .drop-zone { display:flex; align-items:center; justify-content:center; height:80px; border:2px dashed rgba(0,240,255,.2); border-radius:10px; cursor:pointer; transition:all .3s ease; font-size:12px; color:rgba(255,255,255,.4); margin-bottom:8px; }
      .drop-zone:hover { border-color:rgba(0,240,255,.4); background:rgba(0,240,255,.04); }
      .drop-zone.is-dragover { border-color:rgba(0,240,255,.5); background:rgba(0,240,255,.08); }


      .form-status { display:none; padding:10px; border-radius:10px; margin-top:10px; font-size:12px; line-height:1.5; }
      .form-status.is-visible { display:block; }
      .form-status.success { border:1px solid rgba(0,240,255,.25); background:rgba(0,240,255,.08); color:rgba(202,253,255,.92); }
      .form-status.error { border:1px solid rgba(255,140,140,.28); background:rgba(255,90,90,.08); color:rgba(255,220,220,.94); }

      @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
      .shake { animation:shake .6s ease-in-out; }

      .back-btn { position:fixed; left:16px; top:12px; z-index:120; appearance:none; border:0; outline:none; border-radius:10px; padding:8px 14px; cursor:pointer; color:#dffcff; background:rgba(0,240,255,.08); border:1px solid rgba(255,255,255,.1); box-shadow:0 4px 16px rgba(0,0,0,.4); }

      .bounty-nav-row { display:flex; gap:6px; align-items:center; }
      .bounty-nav-link { padding:6px 12px; border-radius:999px; font-size:11px; letter-spacing:.08em; color:rgba(0,240,255,.7); background:rgba(0,240,255,.06); border:1px solid rgba(0,240,255,.15); text-decoration:none; transition:all .3s ease; }
      .bounty-nav-link:hover { color:#dffcff; background:rgba(0,240,255,.12); border-color:rgba(0,240,255,.35); box-shadow:0 0 16px rgba(0,240,255,.15); }

      .modal-overlay { position:fixed; inset:0; z-index:100; display:none; place-items:center; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); }
      .modal-overlay.is-open { display:grid; }
      .modal-content { width:min(700px,90vw); max-height:90vh; background:rgba(10,15,30,.92); border:1px solid rgba(0,240,255,.15); border-radius:20px; overflow:hidden; box-shadow:0 24px 72px rgba(0,0,0,.6),0 0 60px rgba(0,240,255,.08); }
      .modal-hero { position:relative; }
      .modal-hero img { width:100%; max-height:260px; object-fit:cover; }
      .modal-body { padding:24px; }
      .modal-body h2 { margin:0 0 6px; font-size:22px; letter-spacing:.05em; }
      .modal-body .lore { margin:0 0 14px; font-size:13px; color:rgba(255,255,255,.65); line-height:1.7; }
      .modal-meta { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
      .modal-meta .kv { padding:10px; border-radius:10px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); text-align:center; }
      .modal-meta .k { display:block; font-size:9px; letter-spacing:.12em; color:rgba(0,240,255,.6); text-transform:uppercase; margin-bottom:4px; }
      .modal-meta .v { font-size:15px; font-weight:600; }
      .bid-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
      .bid-row input { flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px; color:#eafcff; font-size:16px; outline:none; }
      .bid-row input:focus { border-color:rgba(0,240,255,.35); }
      .bid-presets { display:flex; gap:6px; margin-bottom:14px; }
      .bid-actions { display:flex; gap:10px; }
      .notice { display:none; padding:10px 14px; border-radius:10px; line-height:1.5; font-size:12px; }
      .notice.is-visible { display:block; }
      .notice.success { border:1px solid rgba(0,240,255,.25); background:rgba(0,240,255,.08); color:rgba(202,253,255,.92); }
      .notice.error { border:1px solid rgba(255,140,140,.28); background:rgba(255,90,90,.08); color:rgba(255,220,220,.94); }

      @media (max-width: 900px) {
        .board-layout { grid-template-columns:1fr; }
        .board-sidebar { border-right:0; border-bottom:1px solid rgba(255,255,255,.05); max-height:300px; }
        .modal-meta { grid-template-columns:repeat(2,1fr); }
        .bounty-nav-row { display:none !important; }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="top-bar">
        <h1>&#x2727; 悬赏中枢</h1>
        <div class="actions">
          <div class="balance-chip">余额 <strong id="balance-val">0</strong> ✦</div>
          <button class="btn-primary" id="to-delivery-btn" type="button">进入交付</button>
        </div>
        <nav class="bounty-nav-row">
          <a class="bounty-nav-link" href="./story.html">主剧情</a>
          <a class="bounty-nav-link" href="./auction-board.html">拍卖场</a>
          <a class="bounty-nav-link" href="./memorial-wall.html">身份</a>
          <a class="bounty-nav-link" href="./truth-branding.html">真理烙印</a>
          <a class="bounty-nav-link" href="./wall-test.html">照片墙</a>
        </nav>
      </header>
      <div class="board-layout">
        <aside class="board-sidebar">
          <div class="section-title">契约状态</div>
          <div class="chip">
            <span class="label">星辰余额</span>
            <div class="value"><strong id="balance-val-sidebar">0</strong> ✦</div>
          </div>
          <div class="chip">
            <span class="label">风险等级</span>
            <div class="value" id="risk-val">—</div>
          </div>
          <div class="chip">
            <span class="label">当前契约</span>
            <div class="value" id="contract-val">未托管</div>
          </div>

          <div class="create-panel">
            <div class="section-title">发布新悬赏</div>
            <input id="bounty-title" type="text" placeholder="悬赏标题（例如：寻找失落星辰的旅人）" style="width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px; color:#eafcff; font-size:13px; outline:none; margin-bottom:8px;" />
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
              <input id="bounty-reward" type="number" min="1" placeholder="赏金 (✦)" style="flex: 1; width: 100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px; color:#eafcff; font-size:13px; outline:none;" />
              <input id="bounty-deadline" type="text" placeholder="期限 (如: 72h)" style="flex: 1; width: 100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px; color:#eafcff; font-size:13px; outline:none;" />
            </div>
            <textarea id="bounty-desc" placeholder="描述你的悬赏任务…"></textarea>
            <div class="drop-zone" id="drop-zone">拖拽图片至此 或 点击上传</div>
            <input id="bounty-file" type="file" accept="image/*" hidden />
            <div class="image-preview" id="image-preview">
              <img id="preview-img" alt="预览" />
            </div>
            <button class="btn-primary" id="submit-btn" type="button" style="width:100%">✦ 发布悬赏令</button>
            <div class="form-status" id="form-status"></div>
          </div>
        </aside>

        <main class="board-content">
          <div class="filter-row">
            <button class="nav-tab is-active" data-filter="all" type="button">全部</button>
            <button class="nav-tab" data-filter="available" type="button">待认领</button>
            <button class="nav-tab" data-filter="escrowed" type="button">托管中</button>
            <button class="nav-tab" data-filter="completed" type="button">已完成</button>
          </div>
          <div class="bounty-board-grid" id="bounty-grid"></div>
        </main>
      </div>
    </div>

    <div class="modal-overlay" id="bounty-modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-content">
        <div class="modal-hero">
          <img id="modal-image" alt="悬赏详情" />
        </div>
        <div class="modal-body">
          <h2 id="modal-title"></h2>
          <p class="lore" id="modal-lore"></p>
          <div class="modal-meta">
            <div class="kv"><span class="k">悬赏等级</span><div class="v" id="modal-rarity"></div></div>
            <div class="kv"><span class="k">交付期限</span><div class="v" id="modal-deadline"></div></div>
            <div class="kv"><span class="k">当前状态</span><div class="v" id="modal-status"></div></div>
            <div class="kv"><span class="k">基础赏金</span><div class="v" id="modal-reward"></div></div>
          </div>
          <div class="section-title">竞价托管</div>
          <div class="kv" style="margin-bottom:12px"><span class="k">当前最高</span><div class="v" id="modal-highest"></div></div>
          <div class="kv" style="margin-bottom:12px"><span class="k">你的出价</span><div class="v" id="modal-userbid"></div></div>
          <div class="bid-row">
            <input id="bid-input" type="number" min="1" placeholder="输入托管金额" />
          </div>
          <div class="bid-presets">
            <button class="nav-tab" id="bid-p10" type="button">+10%</button>
            <button class="nav-tab" id="bid-p25" type="button">+25%</button>
            <button class="nav-tab" id="bid-p50" type="button">+50%</button>
            <button class="nav-tab" id="bid-all" type="button">全部</button>
          </div>
          <div class="bid-actions">
            <button class="btn-primary" id="bid-submit" type="button">确认托管</button>
            <button class="btn-secondary" id="modal-close" type="button">关闭</button>
          </div>
          <div class="notice" id="bid-notice"></div>
        </div>
      </div>
    </div>

    <script src="./js/GlobalNavInjector.js"></script>
    <script src="./js/EconomyManager.js"></script>
    <script>

        { id: 'fb12', title: '梦境潜行者', description: '招募梦境潜行者，深入集体潜意识打捞遗失记忆', reward: 3200, image_url: 'https://picsum.photos/seed/bounty-dream/350/220', created_at: new Date(Date.now() - 9 * 86400000).toISOString(), status: 'open' },
      ];

      /* ── Write nexus state for delivery page ── */
      function writeNexusState(bounty, amount, status) {
        try {
          const state = JSON.parse(localStorage.getItem(NEXUS_STATE_KEY) || '{}');
          state.bids = state.bids || {};
          state.bids[bounty.id] = amount;
          state.currentUserBid = {
            itemId: bounty.id,
            amount,
            status,
            signature: '',
            title: bounty.title || (bounty.description ? bounty.description.slice(0, 20) : '未知契约'),
            lore: bounty.description || '',
            rarity: bounty.rarity || getRarity(bounty.reward),
            image: bounty.image_url || '',
            reward: bounty.reward,
            updatedAt: Date.now()
          };
          localStorage.setItem(NEXUS_STATE_KEY, JSON.stringify(state));
          localStorage.setItem('bounty_nexus_active', JSON.stringify(state.currentUserBid));
        } catch (_) {}
      }

      /* ── API: Fetch bounties ── */
      async function fetchBounties() {
        try {
          const res = await fetch('/api/bounty');
          const json = await res.json();
          if (json.ok && Array.isArray(json.data)) {
            bounties = json.data;
          }
        } catch (err) {
          console.error('[bounty] fetch failed', err);
          bounties = [];
        }
        if (bounties.length < 12) {
          const needed = 12 - bounties.length;
          const extras = FALLBACK_BOUNTIES.slice(0, needed).map((fb) => ({ ...fb }));
          bounties = [...bounties, ...extras];
        }
      }

      /* ── API: Create bounty ── */
      async function createBounty(title, description, reward, deadline, imageBase64) {
        const res = await fetch('/api/bounty', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, reward: Number(reward), deadline, imageBase64 }),
        });
        return res.json();
      }

      /* ── API: Claim bounty ── */
      async function claimBounty(bountyId) {
        const res = await fetch('/api/bounty', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: bountyId, action: 'claim', claimedBy: 'user' }),
        });
        return res.json();
      }

      /* ── Utility: Format time ago ── */
      function timeAgo(dateStr) {
        if (!dateStr) return '未知';
        const now = Date.now();
        const created = new Date(dateStr).getTime();
        const diff = now - created;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
        if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
        return `${Math.floor(diff / 86400000)}天前`;
      }

      /* ── Utility: Determine rarity from reward ── */
      function getRarity(reward) {
        if (reward >= 3000) return 'SSR';
        if (reward >= 1000) return 'SR';
        return 'R';
      }

      /* ── Utility: Status label ── */
      function statusLabel(status) {
        const map = { open: '待认领', claimed: '已认领/托管中', escrowed: '已认领/托管中', delivered: '已交付', completed: '已完成', refunded: '已退回', outbid_refunded: '已退回' };
        return map[status] || '未知';
      }

      /* ── Render cards ── */
      function renderBountyCards() {
        const grid = document.getElementById('bounty-grid');
        if (!grid) return;

        const filtered = bounties.filter(b => {
          if (activeFilter === 'all') return true;
          if (activeFilter === 'available') return b.status === 'open';
          if (activeFilter === 'escrowed') return b.status === 'claimed' || b.status === 'escrowed' || b.status === 'delivered';
          if (activeFilter === 'completed') return b.status === 'completed' || b.status === 'refunded' || b.status === 'outbid_refunded' || b.status === 'delivered';
          return true;
        });

        // Clear old cards
        grid.innerHTML = '';

        // Grid layout
        const gridW = grid.offsetWidth || 800;
        const cardW = 200, cardH = 280;
        const cols = Math.max(1, Math.floor(gridW / (cardW + 16)));
        const cellW = gridW / cols;

        filtered.forEach((b, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const x = col * cellW + 8 + (Math.random() - 0.5) * 20;
          const y = row * (cardH + 16) + (Math.random() - 0.5) * 12;
          const rotate = (Math.random() - 0.5) * 6;

          const el = document.createElement('div');
          el.className = 'bounty-card';
          el.style.cssText = `left:${x}px;top:${y}px;width:${cardW}px;height:${cardH}px;--fly-x:${(Math.random()-0.5)*200}px;--fly-y:${(Math.random()-0.5)*200}px;--fly-r:${rotate}deg;animation-delay:${i * 0.06}s;`;
          el.dataset.bountyId = b.id;

          const rarity = b.rarity || getRarity(b.reward);
          const status = b.status || 'open';
          const displayTitle = b.title || (b.description ? b.description.slice(0, 20) : '未命名悬赏');
          const statusBadge = status !== 'open' ? `<span style="position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:6px;font-size:10px;background:rgba(0,0,0,0.6);color:rgba(0,240,255,0.8);z-index:5;">${statusLabel(status)}</span>` : '';

          el.innerHTML = `
            <img src="${b.image_url || ''}" alt="${displayTitle}" loading="lazy" />
            ${statusBadge}
            <div class="bounty-info">
              <h3>${displayTitle}</h3>
              <p class="bounty-lore">${b.description || ''}</p>
              <div class="bounty-tags">
                <span class="rarity-tag rarity-${rarity}">${rarity}</span>
              </div>
              <div class="bounty-meta">
                <span class="reward">${b.reward} ✦</span>
                <span>${timeAgo(b.created_at)}</span>
              </div>
            </div>
            <div class="bounty-actions">
              ${status === 'open' ? `<button class="btn-small claim-btn" data-id="${b.id}">✦ 认领</button>` : ''}
              <button class="btn-ghost detail-btn" data-id="${b.id}">详情</button>
              ${(status === 'claimed' || status === 'escrowed') ? `<button class="btn-ghost deliver-btn" data-id="${b.id}">交付</button>` : (status === 'delivered' ? '<span style="font-size:11px;color:rgba(0,240,255,0.7);margin-left:4px;">已交付</span>' : '')}
            </div>
          `;
          grid.appendChild(el);
        });

        // 动态设置容器高度，防止绝对定位卡片被溢出隐藏
        const rows = Math.ceil(filtered.length / cols);
        grid.style.minHeight = Math.max(500, rows * (cardH + 16) + 40) + 'px';

        // Bind events
        grid.querySelectorAll('.claim-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            await handleClaim(id);
          });
        });
        grid.querySelectorAll('.detail-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            openModal(btn.dataset.id);
          });
        });
        grid.querySelectorAll('.deliver-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            navigateToDelivery(btn.dataset.id);
          });
        });
      }

      // 翻译后端错误提示，提升用户体验
      function translateError(msg) {
        if (!msg) return '未知错误';
        if (msg.includes('not available')) {
          return '该悬赏已被其他流浪者抢先认领，请寻找下一个目标吧！';
        }
        if (msg.includes('must be claimed first') || msg.includes('status: delivered')) {
          return '该悬赏已交付，无需重复操作。';
        }
        if (msg.includes('cannot be completed')) {
          return '当前状态无法完成归档。';
        }
        if (msg.includes('refunded')) {
          return '只有已认领的悬赏才能退回托管。';
        }
        return msg;
      }

      /* ── Handle claim ── */
      async function handleClaim(bountyId) {
        const bounty = bounties.find(b => b.id === bountyId);
        if (!bounty) return;
        const reward = Number(bounty.reward);
        const bal = (window.EconomyManager?.getBalance?.() ?? Number(localStorage.getItem("stardust_balance") || 0)) || 0;
        if (bal < reward) {
          showFormStatus('error', `余额不足！需要 ${reward} ✦，当前 ${bal} ✦`);
          return;
        }
        // Deduct
        if (window.EconomyManager) {
          const ok = window.EconomyManager.spendStardust(reward);
          if (!ok) {
            showFormStatus('error', `扣款失败，余额不足`);
            return;
          }
        }
        // Update sidebar
        updateSidebar(bounty);
        // Write nexus state for delivery page
        writeNexusState(bounty, reward, 'escrowed');
        // Call API
        try {
          const res = await claimBounty(bountyId);
          if (res.ok) {
            showFormStatus('success', `已认领！赏金 ${reward} ✦ 已托管`);
            bounty.status = 'escrowed';
            renderBountyCards();
            // Navigate to delivery
            setTimeout(() => navigateToDelivery(bountyId), 800);
          } else {
            showFormStatus('error', translateError(res.error) || '认领失败');
            if (window.EconomyManager) {
              window.EconomyManager.addStardust(reward);
            }
            // Remove nexus state on failure
            try {
              const state = JSON.parse(localStorage.getItem(NEXUS_STATE_KEY) || '{}');
              if (state.currentUserBid?.itemId === bounty.id) {
                delete state.bids[bounty.id];
                state.currentUserBid = null;
                localStorage.setItem(NEXUS_STATE_KEY, JSON.stringify(state));
                localStorage.removeItem('bounty_nexus_active');
              }
            } catch (_) {}
          }
        } catch (err) {
          showFormStatus('error', '网络异常，请稍后重试');
          if (window.EconomyManager) {
            window.EconomyManager.addStardust(reward);
          }
        }
      }

      /* ── Navigate to delivery ── */
      function navigateToDelivery(bountyId) {
        if (window.PortalRouter && window.PortalRouter.navigate) {
          window.PortalRouter.navigate('delivery', { itemId: bountyId });
        } else {
          window.location.href = `./bounty-delivery.html?itemId=${bountyId}`;
        }
      }

      /* ── Modal ── */
      function openModal(bountyId) {
        selectedBounty = bounties.find(b => b.id === bountyId);
        if (!selectedBounty) return;
        const modal = document.getElementById('bounty-modal');
        const img = document.getElementById('modal-image');
        const title = document.getElementById('modal-title');
        const lore = document.getElementById('modal-lore');
        const rarity = document.getElementById('modal-rarity');
        const deadline = document.getElementById('modal-deadline');
        const status = document.getElementById('modal-status');
        const reward = document.getElementById('modal-reward');
        const highest = document.getElementById('modal-highest');
        const userbid = document.getElementById('modal-userbid');
        const bidInput = document.getElementById('bid-input');

        img.src = selectedBounty.image_url || '';
        title.textContent = selectedBounty.title || (selectedBounty.description ? selectedBounty.description.slice(0, 20) : '未命名悬赏');
        lore.textContent = selectedBounty.description || '';
        rarity.textContent = getRarity(selectedBounty.reward);
        deadline.textContent = '72 小时';
        status.textContent = statusLabel(selectedBounty.status || 'open');
        reward.textContent = `${selectedBounty.reward} ✦`;
        highest.textContent = `${selectedBounty.reward} ✦`;
        userbid.textContent = '未出价';
        bidInput.value = selectedBounty.reward;

        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeModal() {
        const modal = document.getElementById('bounty-modal');
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        selectedBounty = null;
      }

      function showBidNotice(type, msg) {
        const el = document.getElementById('bid-notice');
        el.className = `notice is-visible ${type}`;
        el.textContent = msg;
        setTimeout(() => { el.className = 'notice'; }, 4000);
      }

      /* ── Bid helpers ── */
      function setupBidButtons() {
        const input = document.getElementById('bid-input');
        const p10 = document.getElementById('bid-p10');
        const p25 = document.getElementById('bid-p25');
        const p50 = document.getElementById('bid-p50');
        const allBtn = document.getElementById('bid-all');
        if (p10) p10.addEventListener('click', () => { const base = selectedBounty ? Number(selectedBounty.reward) : 0; input.value = Math.ceil((input.value || base) * 1.1); });
        if (p25) p25.addEventListener('click', () => { const base = selectedBounty ? Number(selectedBounty.reward) : 0; input.value = Math.ceil((input.value || base) * 1.25); });
        if (p50) p50.addEventListener('click', () => { const base = selectedBounty ? Number(selectedBounty.reward) : 0; input.value = Math.ceil((input.value || base) * 1.5); });
        if (allBtn) allBtn.addEventListener('click', () => { const bal = (window.EconomyManager?.getBalance?.() ?? Number(localStorage.getItem("stardust_balance") || 0)) || 0; input.value = bal; });
      }

      /* ── Sync balance ── */
      function syncBalance() {
        const bal = (window.EconomyManager?.getBalance?.() ?? Number(localStorage.getItem("stardust_balance") || 0)) || 0;
        const val = document.getElementById('balance-val');
        const valSide = document.getElementById('balance-val-sidebar');
        if (val) val.textContent = bal;
        if (valSide) valSide.textContent = bal;
      }

      /* ── Update sidebar ── */
      function updateSidebar(bounty) {
        const risk = document.getElementById('risk-val');
        const contract = document.getElementById('contract-val');
        if (risk) risk.textContent = '悬赏活跃，资金流动加速';
        if (contract && bounty) {
          const title = bounty.title || (bounty.description ? bounty.description.slice(0, 18) : '悬赏');
          contract.textContent = `${title} | 赏金 ${bounty.reward} ✦ 托管中`;
        }
      }

      /* ── Form status ── */
      function showFormStatus(type, msg) {
        const el = document.getElementById('form-status');
        if (!el) return;
        el.className = `form-status is-visible ${type}`;
        el.textContent = msg;
        setTimeout(() => { el.className = 'form-status'; }, 5000);
      }

      /* ── Image upload ── */
      function setupImageUpload() {
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('bounty-file');
        const preview = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');

        function handleFile(file) {
          if (!file || !file.type.startsWith('image/')) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            uploadedSource = e.target.result;
            previewImg.src = uploadedSource;
            preview.classList.add('is-visible');
          };
          reader.readAsDataURL(file);
        }

        if (fileInput) {
          fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
          });
        }
        if (dropZone) {
          dropZone.addEventListener('click', () => { if (fileInput) fileInput.click(); });
          ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add('is-dragover'); });
          });
          ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.remove('is-dragover'); });
          });
          dropZone.addEventListener('drop', (e) => {
            if (e.dataTransfer && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
          });
        }
      }

      /* ── Submit form ── */
      function setupSubmitForm() {
        const btn = document.getElementById('submit-btn');
        if (!btn) return;
        btn.addEventListener('click', async () => {
        const title = document.getElementById('bounty-title').value.trim();
        const reward = document.getElementById('bounty-reward').value;
        const deadline = document.getElementById('bounty-deadline').value.trim() || '72h';
        const desc = document.getElementById('bounty-desc').value.trim();
        const imageBase64 = uploadedSource;

        if (!title) { showFormStatus('error', '请填写悬赏标题'); return; }
        if (!desc) { showFormStatus('error', '请填写悬赏描述'); return; }
        if (!reward || Number(reward) <= 0) { showFormStatus('error', '请填写有效悬赏金额'); return; }
        if (!imageBase64) { showFormStatus('error', '请上传悬赏附图'); return; }

          const bal = (window.EconomyManager?.getBalance?.() ?? Number(localStorage.getItem("stardust_balance") || 0)) || 0;
          if (bal < Number(reward)) {
            showFormStatus('error', `余额不足！需要 ${reward} ✦，当前 ${bal} ✦`);
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 600);
            return;
          }

          btn.disabled = true;
          btn.textContent = '✦ 正在发榜…';
          showFormStatus('', '提交中…');

          try {
            const res = await createBounty(title, desc, reward, deadline, imageBase64);
            if (res.ok) {
              if (window.EconomyManager) {
                window.EconomyManager.spendStardust(Number(reward));
              }
              showFormStatus('success', `悬赏已发布！赏金 ${reward} ✦ 已扣除`);
              document.getElementById('bounty-reward').value = '';
              document.getElementById('bounty-desc').value = '';
              uploadedSource = '';
              document.getElementById('image-preview').classList.remove('is-visible');
              await fetchBounties();
              renderBountyCards();
              syncBalance();
            } else {
              showFormStatus('error', translateError(res.error) || '发布失败');
            }
          } catch (err) {
            showFormStatus('error', '网络异常，请稍后重试');
          }
          btn.disabled = false;
          btn.textContent = '✦ 发布悬赏令';
        });
      }

      /* ── Filter buttons ── */
      function setupFilters() {
        document.querySelectorAll('.nav-tab').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('is-active'));
            btn.classList.add('is-active');
            activeFilter = btn.dataset.filter;
            renderBountyCards();
          });
        });
      }

      /* ── Navigate to delivery button ── */
      function setupDeliveryBtn() {
        const btn = document.getElementById('to-delivery-btn');
        if (btn) {
          btn.addEventListener('click', () => {
            // Navigate to delivery with the current user's active bid if any
            const activeId = JSON.parse(localStorage.getItem('bounty_nexus_active') || '{}')?.itemId || '';
            navigateToDelivery(activeId);
          });
        }
      }

      /* ── Init ── */
      async function init() {
        window.GlobalNavInjector?.inject?.();
        syncBalance();
        if (window.EconomyManager) {
          window.EconomyManager.onChange(syncBalance);
        }
        setupFilters();
        setupImageUpload();
        setupSubmitForm();
        setupBidButtons();
        setupDeliveryBtn();

        // Modal close
        document.getElementById('bounty-modal').addEventListener('click', (e) => {
          if (e.target.id === 'bounty-modal') closeModal();
        });
        document.getElementById('modal-close').addEventListener('click', closeModal);

        // Bid submit
        document.getElementById('bid-submit').addEventListener('click', async () => {
          if (!selectedBounty) return;
          const bid = Number(document.getElementById('bid-input').value);
          if (bid <= 0) { showBidNotice('error', '请输入有效出价'); return; }
          const bal = (window.EconomyManager?.getBalance?.() ?? Number(localStorage.getItem("stardust_balance") || 0)) || 0;
          if (bal < bid) { showBidNotice('error', `余额不足！需要 ${bid} ✦，当前 ${bal} ✦`); return; }

          if (window.EconomyManager) {
            const ok = window.EconomyManager.spendStardust(bid);
            if (!ok) { showBidNotice('error', `扣款失败`); return; }
          }
          const res = await claimBounty(selectedBounty.id);
          if (res.ok) {
            selectedBounty.status = 'escrowed';
            writeNexusState(selectedBounty, bid, 'escrowed');
            showBidNotice('success', `出价 ${bid} ✦ 托管成功！`);
            syncBalance();
            renderBountyCards();
            setTimeout(() => { closeModal(); navigateToDelivery(selectedBounty.id); }, 1000);
          } else {
            if (window.EconomyManager) window.EconomyManager.addStardust(bid);
            showBidNotice('error', translateError(res.error) || '托管失败');
          }
        });

        await fetchBounties();
        renderBountyCards();
      }

      init();
    </script>
  </body>
</html>
