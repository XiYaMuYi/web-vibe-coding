<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0F19" />
  <title>星辰典当行</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  </style>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">
  <!-- 全局 BGM -->
  <audio id="global-bgm" src="./audio/all.mp3" loop preload="auto"></audio>

  <!-- 启动拦截 -->
  <div id="start-overlay" style="position:fixed; z-index:9999; inset:0; background:#0B0F19; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; cursor:pointer;">
    <h1 style="font-size: clamp(28px, 5vw, 48px); letter-spacing: 4px; text-shadow: 0 0 10px #00F0FF; font-family: serif;">星辰典当行</h1>
    <p style="opacity: 0.7; margin-top: 20px; font-size: 14px; letter-spacing: 2px;">[ 点击任意处，连接星轨 ]</p>
  </div>

  <!-- 全屏 Iframe 承载所有子页面 -->
  <iframe id="app-frame" src="" style="width:100vw; height:100vh; border:none; display:none;"></iframe>

  <script>
    document.getElementById('start-overlay').addEventListener('click', function () {
      // 1. 突破浏览器限制，播放音频
      const bgm = document.getElementById('global-bgm');
      bgm.volume = 0.5;
      bgm.play().catch(() => {
        // 如果自动播放被阻止，静默降级
      });

      // 2. 隐藏拦截器，显示 Iframe 并加载真实剧情页
      this.style.display = 'none';
      const frame = document.getElementById('app-frame');
      frame.style.display = 'block';
      frame.src = 'story.html';
    });
  </script>
</body>
</html>
