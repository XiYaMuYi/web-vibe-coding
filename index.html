<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0F19" />
  <title>星辰典当行</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  </style>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">
  <!-- 全局 BGM -->
  <audio id="global-bgm" src="./audio/all.mp3" loop preload="auto"></audio>

  <!-- 启动拦截 -->
  <div id="start-overlay" style="position:fixed; z-index:9999; inset:0; background:#0B0F19; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff;">
    <h1 style="font-size: clamp(28px, 5vw, 48px); letter-spacing: 4px; text-shadow: 0 0 10px #00F0FF; font-family: serif; margin-bottom: 24px;">星辰典当行</h1>
    <p style="opacity: 0.7; margin-bottom: 28px; font-size: 14px; letter-spacing: 2px; text-align:center; line-height:1.8;">选择你要进入的星际界面</p>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center; padding:0 20px;">
      <button data-target="story.html" style="padding:14px 18px; border-radius:14px; border:1px solid rgba(0,240,255,0.25); background:rgba(0,240,255,0.08); color:#dffcff; cursor:pointer;">进入主剧情</button>
      <button data-target="bounty-board.html" style="padding:14px 18px; border-radius:14px; border:1px solid rgba(0,240,255,0.25); background:rgba(0,240,255,0.08); color:#dffcff; cursor:pointer;">进入悬赏中枢</button>
      <button data-target="bounty-delivery.html" style="padding:14px 18px; border-radius:14px; border:1px solid rgba(0,240,255,0.25); background:rgba(0,240,255,0.08); color:#dffcff; cursor:pointer;">进入交付归档</button>
    </div>
  </div>

  <!-- 全屏 Iframe 承载所有子页面 -->
  <iframe id="app-frame" src="" style="width:100vw; height:100vh; border:none; display:none;"></iframe>

  <script src="./js/PortalRouter.js"></script>
  <script>
    const overlay = document.getElementById('start-overlay');
    const bgm = document.getElementById('global-bgm');
    function enterPage(src) {
      bgm.volume = 0.5;
      bgm.play().catch(() => {});
      overlay.style.display = 'none';
      window.PortalRouter?.navigate?.(src.replace('.html', ''), {});
    }
    overlay.querySelectorAll('button[data-target]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        enterPage(btn.dataset.target);
      });
    });
    overlay.addEventListener('click', () => enterPage('story.html'));
  </script>
</body>
</html>
